services:
  - type: web
    name: gestion-reclamations
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:8000" # 
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0 
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true 
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
