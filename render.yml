services:
  - type: web
    name: mon-projet-django  # Change par le nom de ton projet
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:8000" # Remplace 'ton_nom_de_projet'
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0 # Ta version de python
      - key: DATABASE_URL
        sync: false # La valeur sera à remplir dans le dashboard Render
      - key: RESEND_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true # Render génère une clé sécurisée pour toi
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
